name: Build and Deploy Automation

on:
  push:
    branches:
      - main # Automasi: Pipeline berjalan otomatis setiap ada push ke branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/web-order:latest

  # Catatan: Bagian deploy ke Kubernetes akan sangat bergantung pada cloud apa yang dipakai (GCP, AWS, atau DigitalOcean). 
  # Umumnya di sini kita akan menambahkan step untuk login ke Cloud Provider dan menjalankan perintah:
  # kubectl apply -f k8s/deployment.yaml