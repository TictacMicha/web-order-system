<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef - Antrean Pesanan</title>
    <style>
        body {
            background-color: #fdfbf7;
            color: #333333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 30px;
            margin: 0;
        }
        .header-app {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }
        .header-app h2 { 
            margin: 0; 
            font-size: 28px; 
            color: #333; 
            font-weight: bold;
        }
        #daftarPesanan {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        .card-header {
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .card h3 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #b85014;
        }
        .card-nama {
            font-size: 15px;
            color: #777;
            font-weight: bold;
        }
        .card ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 25px 0;
            flex-grow: 1;
        }
        .card li {
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: flex-start;
            font-weight: 500;
        }
        .card li::before {
            content: "•";
            color: #ff7b00;
            font-weight: bold;
            display: inline-block;
            width: 1em;
            font-size: 20px;
            line-height: 18px;
        }
        .btn-selesai {
            background-color: #ff7b00;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s;
            width: 100%;
        }
        .btn-selesai:hover {
            background-color: #b85014;
        }
    </style>
</head>
<body>
    <div class="header-app">
        <h2>Antrean Dapur</h2>
    </div>
    <div id="daftarPesanan"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('updateQueue', (queue) => {
            const list = document.getElementById('daftarPesanan');
            list.innerHTML = '';
            
            queue.forEach(order => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const header = document.createElement('div');
                header.className = 'card-header';
                
                const title = document.createElement('h3');
                title.innerText = `Meja ${order.meja}`;
                
                const nama = document.createElement('div');
                nama.className = 'card-nama';
                nama.innerText = `Pemesan: ${order.namaPelanggan} (#${order.id})`;
                
                header.appendChild(title);
                header.appendChild(nama);
                
                const ul = document.createElement('ul');
                order.items.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = item;
                    ul.appendChild(li);
                });
                
                const btn = document.createElement('button');
                btn.className = 'btn-selesai';
                btn.innerText = "Selesai (Dequeue)";
                
                const dequeue = function() {
                    socket.emit('finishOrder', order.id);
                };
                
                btn.onclick = dequeue;
                
                card.appendChild(header);
                card.appendChild(ul);
                card.appendChild(btn);
                list.appendChild(card);
            });
        });
    </script>
</body>
</html>
