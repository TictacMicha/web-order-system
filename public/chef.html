<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Order Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="/js/tailwind-theme.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">tailwind.config = window.quickbiteTailwindConfig;</script>
  <style>
    .warm-shadow { box-shadow: 0 4px 12px rgba(211, 47, 47, 0.1); }
    .warm-shadow-hover { box-shadow: 0 12px 24px rgba(211, 47, 47, 0.15); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    body { min-height: max(884px, 100dvh); font-family: "Montserrat", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
  </style>
</head>
<body class="bg-background text-on-background antialiased min-h-screen">
  <div class="mx-auto w-full max-w-[430px] min-h-screen bg-background relative">
  <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-50 flex justify-center items-center px-4 h-16 bg-surface/90 backdrop-blur-md shadow-sm">
    <h1 class="text-xl font-semibold text-primary">Pesanan Masuk</h1>
  </header>

  <main class="pt-20 pb-28 px-4 min-h-screen">
    <div class="flex justify-between items-end mb-8 gap-4">
      <div>
        <h2 class="text-3xl font-bold text-on-background mb-2">Active Orders</h2>
        <p class="text-on-surface-variant" id="queueSubtitle">Memuat antrean pesanan...</p>
      </div>
      <div class="flex gap-2">
        <button id="refreshOrders" class="bg-primary text-on-primary px-4 py-2 rounded-full font-semibold hover:opacity-90 transition-colors shadow-sm">
          Refresh
        </button>
      </div>
    </div>

    <div id="emptyState" class="hidden bg-surface-container-lowest rounded-xl border border-outline-variant p-6 text-center text-on-surface-variant">
      Belum ada pesanan aktif saat ini.
    </div>

    <div id="orderGrid" class="grid grid-cols-1 gap-6"></div>
  </main>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-50 flex justify-center items-center h-20 px-2 pb-safe bg-surface shadow-[0_-4px_12px_rgba(211,47,47,0.06)] rounded-t-xl">
    <a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-1 active:scale-90 transition-all duration-150" href="/chef.html">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
      <span class="text-sm font-semibold mt-1">Orders</span>
    </a>
  </nav>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/order-id.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/chef.js"></script>
</body>
</html>
