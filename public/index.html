<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBite - Home</title>
  <script src="/js/tailwind-theme.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/validator@13.15.23/validator.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script id="tailwind-config">tailwind.config = window.quickbiteTailwindConfig;</script>
  <link rel="stylesheet" href="/styles/theme.css" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { font-family: "Inter", sans-serif; }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">
  <header class="sticky top-0 z-40 bg-surface shadow-md w-full max-w-[430px] mx-auto">
    <div class="flex items-center justify-between px-md py-base w-full">
      <div class="flex items-center">
        <h1 class="font-display-lg text-headline-md font-bold text-primary">Home</h1>
      </div>
      <div class="flex items-center gap-sm">
        <a href="/profile.html" class="w-10 h-10 rounded-full overflow-hidden border-2 border-red-100 block">
          <img alt="Profile" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1506863530036-1efeddceb993?q=80&w=300&auto=format&fit=crop" />
        </a>
      </div>
    </div>
  </header>

  <main class="w-full max-w-[430px] mx-auto px-container-margin-mobile py-md">
    <section class="mb-md">
      <button id="locationTrigger" class="w-full text-left bg-surface-container-lowest border border-outline-variant rounded-xl px-md py-sm">
        <span class="text-xs text-on-surface-variant block">Deliver to</span>
        <span id="locationLabel" class="text-sm font-bold">Jl. Sudirman, Jakarta</span>
      </button>
    </section>
    <section class="mb-lg">
      <div class="relative flex items-center bg-white shadow-sm rounded-xl px-md py-sm border border-outline-variant">
        <span class="material-symbols-outlined text-on-surface-variant mr-sm">search</span>
        <input id="searchInput" class="bg-transparent border-none focus:ring-0 w-full placeholder:text-on-surface-variant/60" placeholder="What are you craving for?" type="text" />
        <button id="filterButton" class="p-xs text-primary" aria-label="Filter">
          <span class="material-symbols-outlined">tune</span>
        </button>
      </div>
    </section>

    <section class="mb-xl">
      <div class="relative overflow-hidden rounded-xl bg-primary h-44 flex items-center shadow-lg group">
        <div class="absolute inset-0 bg-gradient-to-r from-black/45 to-transparent z-10"></div>
        <img alt="Promo Banner" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" src="/Image/promo-banner.png" />
        <div class="relative z-20 px-lg text-white max-w-[70%]">
          <h2 class="text-2xl font-bold mb-xs" style="font-family: Montserrat, sans-serif;">Get 50% OFF</h2>
          <p class="text-sm opacity-90 mb-md">Special discount for your first three orders.</p>
          <button id="claimPromoButton" class="bg-white text-primary font-semibold px-lg py-sm rounded-full shadow-md active:scale-95 transition-transform">Claim Now</button>
        </div>
      </div>
    </section>

    <section class="mb-xl">
      <div class="flex items-center justify-between mb-md">
        <h3 class="text-xl font-semibold" style="font-family: Montserrat, sans-serif;">Categories</h3>
        <a href="/category.html?name=all" class="text-primary font-semibold hover:underline">View All</a>
      </div>
      <div class="flex gap-md overflow-x-auto hide-scrollbar pb-xs">
        <a href="/category.html?name=burger" class="flex flex-col items-center gap-sm min-w-[80px]"><div class="w-16 h-16 bg-surface-container rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined text-3xl">lunch_dining</span></div><span class="text-sm">Burger</span></a>
        <a href="/category.html?name=pizza" class="flex flex-col items-center gap-sm min-w-[80px]"><div class="w-16 h-16 bg-surface-container rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined text-3xl">local_pizza</span></div><span class="text-sm">Pizza</span></a>
        <a href="/category.html?name=sushi" class="flex flex-col items-center gap-sm min-w-[80px]"><div class="w-16 h-16 bg-surface-container rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined text-3xl">set_meal</span></div><span class="text-sm">Sushi</span></a>
        <a href="/category.html?name=drinks" class="flex flex-col items-center gap-sm min-w-[80px]"><div class="w-16 h-16 bg-surface-container rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined text-3xl">local_bar</span></div><span class="text-sm">Drinks</span></a>
      </div>
    </section>

    <section>
      <div class="flex items-center justify-between mb-md">
        <h3 class="text-xl font-semibold" style="font-family: Montserrat, sans-serif;">Popular Today</h3>
        <a href="/category.html?name=all" class="text-primary font-semibold hover:underline">See More</a>
      </div>
      <div class="grid grid-cols-1 gap-lg" id="menuGrid"></div>
    </section>
  </main>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-50 flex justify-around items-center px-container-margin-mobile py-xs bg-white shadow-lg rounded-t-xl">
    <a class="flex flex-col items-center justify-center bg-primary text-white rounded-full px-4 py-1" href="/"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">home</span><span class="text-xs">Home</span></a>
    <a class="flex flex-col items-center justify-center text-secondary px-4 py-1" href="/cart.html"><span class="material-symbols-outlined">shopping_cart</span><span class="text-xs">Cart</span></a>
    <a class="flex flex-col items-center justify-center text-secondary px-4 py-1" href="/profile.html"><span class="material-symbols-outlined">person</span><span class="text-xs">Profile</span></a>
  </nav>

  <script src="/js/index.js"></script>
</body>
</html>
