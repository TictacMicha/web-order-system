<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBite - Profile</title>
  <script src="/js/tailwind-theme.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="/styles/theme.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script id="tailwind-config">tailwind.config = window.quickbiteTailwindConfig;</script>
</head>
<body class="bg-background text-on-surface min-h-screen pb-24" style="font-family: Inter, sans-serif;">
  <header class="sticky top-0 z-40 bg-surface shadow-md w-full max-w-[430px] mx-auto">
    <div class="flex items-center justify-between px-md py-base w-full">
      <div class="flex items-center">
        <h1 class="font-display-lg text-headline-md font-bold text-primary">Profile</h1>
      </div>
      <div></div>
    </div>
  </header>

  <main class="w-full max-w-[430px] mx-auto px-container-margin-mobile py-md space-y-md">
    <section class="bg-surface-container-lowest rounded-xl border border-outline-variant p-md flex items-center gap-md">
      <img class="w-14 h-14 rounded-full object-cover border-2 border-red-100" src="https://images.unsplash.com/photo-1506863530036-1efeddceb993?q=80&w=300&auto=format&fit=crop" alt="Profile Avatar" />
      <div>
        <p class="font-semibold">Guest User</p>
        <p class="text-sm text-on-surface-variant">Riwayat pesanan kamu ada di bawah.</p>
      </div>
    </section>

    <section class="space-y-sm">
      <h2 class="text-base font-semibold">Riwayat Pesanan</h2>
      <div id="historyList" class="space-y-sm"></div>
      <div id="historyEmpty" class="hidden bg-surface-container-lowest rounded-xl border border-outline-variant p-md text-sm text-on-surface-variant">
        Belum ada riwayat pesanan.
      </div>
    </section>
  </main>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-50 flex justify-around items-center px-container-margin-mobile py-xs bg-white shadow-lg rounded-t-xl">
    <a class="flex flex-col items-center justify-center text-secondary px-4 py-1" href="/"><span class="material-symbols-outlined">home</span><span class="text-xs">Home</span></a>
    <a class="flex flex-col items-center justify-center text-secondary px-4 py-1" href="/cart.html"><span class="material-symbols-outlined">shopping_cart</span><span class="text-xs">Cart</span></a>
    <a class="flex flex-col items-center justify-center bg-primary text-white rounded-full px-4 py-1" href="/profile.html"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">person</span><span class="text-xs">Profile</span></a>
  </nav>

  <script>
    const history = JSON.parse(localStorage.getItem("qb:orderHistory") || "[]");
    const list = document.getElementById("historyList");
    const empty = document.getElementById("historyEmpty");

    function toRupiah(value) {
      return `Rp ${value.toLocaleString("id-ID")}`;
    }

    if (!history.length) {
      empty.classList.remove("hidden");
    } else {
      history.forEach((order) => {
        const item = document.createElement("article");
        item.className = "bg-surface-container-lowest rounded-xl border border-outline-variant p-md";
        item.innerHTML = `
          <div class="flex items-start justify-between mb-xs">
            <p class="font-semibold">Order #QB-${String(order.id).padStart(5, "0")}</p>
            <span class="text-primary font-semibold">${toRupiah(order.total)}</span>
          </div>
          <p class="text-xs text-on-surface-variant mb-xs">${new Date(order.at).toLocaleString("id-ID")}</p>
          <p class="text-sm mb-xs">${order.items.join(", ")}</p>
          <p class="text-xs text-on-surface-variant">${order.payment} • ${order.address}</p>
        `;
        list.appendChild(item);
      });
    }
  </script>
</body>
</html>
