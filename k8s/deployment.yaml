apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-order-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1         # Boleh nambah 1 pod baru saat update
      maxUnavailable: 0   # JANGAN matikan pod lama sebelum pod baru menyala
  selector:
    matchLabels:
      app: web-order
  template:
    metadata:
      labels:
        app: web-order
    spec:
      containers:
      - name: web-order-container
        image: mirzakhairano/web-order:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        # Satpam K8s untuk ngecek aplikasinya udah benar-benar nyala atau belum
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5